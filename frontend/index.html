<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Science Course</title>
<style>#splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#1a1a2e}#splash .spinner{width:48px;height:48px;border:3px solid #2a2a4a;border-top-color:#7c5cfc;border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}#splash-msg{color:#888;font-size:1rem;margin-top:1rem;text-align:center}.splash-inner{text-align:center;display:flex;flex-direction:column;align-items:center}</style>
<link rel="stylesheet" href="/static/css/style.css?v=3">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚀%3C/text%3E%3C/svg%3E">
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1><span class="ds-logo">DS</span> Data Science</h1>
      <p class="subtitle">Курс-самоучитель</p>
    </div>

    <div class="theme-switcher">
      <button class="theme-btn active" data-theme="dark" title="Тёмная тема">🌙</button>
      <button class="theme-btn" data-theme="light" title="Светлая тема">☀️</button>
      <button class="theme-btn" data-theme="nu-metal" title="Nu-metal тема">🤘</button>
      <button class="theme-btn" data-theme="teenage-engineering" title="Teenage Engineering">▢</button>
    </div>

    <div class="progress-block">
      <div class="progress-label">
        <span>Прогресс</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
      </div>
    </div>

    <div class="runtime-status" id="runtime-status">
      <div class="rs-row" data-engine="py">
        <span class="rs-dot"></span>
        <span class="rs-label">Python</span>
        <span class="rs-state">⏳</span>
      </div>
      <div class="rs-row" data-engine="sql">
        <span class="rs-dot"></span>
        <span class="rs-label">SQL</span>
        <span class="rs-state">⏳</span>
      </div>
    </div>

    <nav id="sidebar-nav">
      <div class="nav-section">
        <a href="#/" class="nav-link" data-view="home"><span>🏠</span> Главная</a>
        <a href="#/achievements" class="nav-link" data-view="achievements"><span>🏆</span> Достижения</a>
      </div>
      <div id="blocks-nav" class="nav-section">
        <!-- Блоки и уроки рендерятся JS -->
      </div>
      <div class="nav-section">
        <a href="#/projects" class="nav-link" data-view="projects"><span>📁</span> Проекты</a>
        <a href="#/interview" class="nav-link" data-view="interview"><span>💼</span> Собеседования</a>
      </div>
    </nav>
  </aside>

  <!-- Loading splash (пока init не закончит) -->
  <div id="splash">
    <div class="splash-inner">
      <div class="spinner"></div>
      <p id="splash-msg">Загружаю курс...</p>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Открыть меню" aria-expanded="false">☰</button>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <div class="guitar-decor" title="nu-metal vibes">🎸</div>

  <main id="main"></main>
</div>

<!-- Модалка достижений -->
<div id="achievement-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="achievement-title">
  <div class="modal-content">
    <div id="achievement-icon" class="achievement-big-icon">🏆</div>
    <h2 id="achievement-title">Достижение!</h2>
    <p id="achievement-desc"></p>
    <button class="btn btn-primary" id="achievement-close">Отлично!</button>
  </div>
</div>

<!-- Модалка персонажа -->
<div id="character-modal" style="display:none;" role="dialog" aria-modal="true">
  <div class="character-modal-card">
    <button class="character-modal-close">&times;</button>
    <img class="character-modal-avatar" src="" alt="">
    <div class="character-modal-name"></div>
    <div class="character-modal-role"></div>
    <div class="character-modal-desc"></div>
  </div>
</div>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<script defer src="/static/js/sandbox_python.js?v=3"></script>
<script defer src="/static/js/sandbox_sql.js?v=3"></script>
<script defer src="/static/js/app.js?v=3"></script>
</body>
</html>
